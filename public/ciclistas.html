            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                </div>

                <div class="lg:col-span-1">
                    <div class="bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-2xl p-6 h-[600px] flex flex-col shadow-xl relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
                        <div class="flex items-center gap-3 mb-6 border-b border-zinc-800/60 pb-3 shrink-0 relative z-10">
                            <i class="fas fa-newspaper text-emerald-400"></i>
                            <h2 class="text-base font-black text-white italic uppercase tracking-tight">Menciones en <span class="text-emerald-400">Noticias</span></h2>
                        </div>

    </main>

    <script>
        window.riderCalendarioGlobal = null;

        // DICCIONARIO DE BANDERAS
        const flagMap = {
            'ESP': '🇪🇸', 'COL': '🇨🇴', 'SLO': '🇸🇮', 'BEL': '🇧🇪', 'FRA': '🇫🇷',
            'ITA': '🇮🇹', 'GBR': '🇬🇧', 'NED': '🇳🇱', 'DEN': '🇩🇰', 'USA': '🇺🇸',
            'AUS': '🇦🇺', 'SUI': '🇨🇭', 'GER': '🇩🇪', 'POR': '🇵🇹', 'ECU': '🇪🇨', 
            'NOR': '🇳🇴', 'AUT': '🇦🇹', 'IRL': '🇮🇪', 'CAN': '🇨🇦', 'NZL': '🇳🇿', 
            'RSA': '🇿🇦', 'ERI': '🇪🇷', 'KAZ': '🇰🇿', 'POL': '🇵🇱', 'CZE': '🇨🇿', 
            'LAT': '🇱🇻', 'LUX': '🇱🇺', 'SVK': '🇸🇰'
        };

        function getFlag(code) { return flagMap[code.toUpperCase()] || '🏳️'; }

        // FUNCION BOTÓN COMPARTIR
        function shareProfile() {
            // Reemplaza por la ruta amigable si la implementamos luego, por ahora copia la URL actual
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const textSpan = document.getElementById('share-text');
                const origText = textSpan.innerText;
                textSpan.innerText = '¡Copiado!';
                setTimeout(() => textSpan.innerText = origText, 2500);
            });
        }

        function formatDisplayRiderName(name) {
            if (!name) return "Cargando...";
            let words = name.trim().split(/\s+/);
            let upperWords = [];
            let normalWords = [];

            words.forEach(w => {
                if (w === w.toUpperCase() && w.length > 1 && !/\d/.test(w)) {
                    upperWords.push(w);
                } else {
                    normalWords.push(w);
                }
            });

            let finalName = name;
            if (upperWords.length > 0 && normalWords.length > 0) {
                finalName = normalWords.join(' ') + ' ' + upperWords.join(' ');
            }
            return finalName.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
        }

        function normalizeName(name) {
            if (!name) return '';
            return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function isSameRider(name1, name2) {
            if (!name1 || !name2) return false;
            const n1 = normalizeName(name1);
            const n2 = normalizeName(name2);
            if (n1 === n2) return true; 
            
            const p1 = n1.split(' ').filter(w => w.length > 2);
            const p2 = n2.split(' ').filter(w => w.length > 2);
            
            if (p1.length > 0 && p1.every(w => n2.includes(w))) return true;
            if (p2.length > 0 && p2.every(w => n1.includes(w))) return true;
            
            return false;
        }

        function getSlug(name) {
            let slug = normalizeName(name);
            return slug.replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
        }

        function getBadgeHTML(pos) {
            if (!pos || pos === '-' || pos.trim() === '') {
                return `<div class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg text-zinc-600 bg-zinc-900/80 border border-zinc-800 shadow-inner"><i class="fas fa-flag-checkered text-[12px] opacity-60"></i></div>`;
            }
            
            let badgeColor = 'text-zinc-400 bg-zinc-800/80 border border-zinc-700 shadow-inner'; 
            let posClean = pos.trim().toUpperCase();
            
            if(posClean === '1') badgeColor = 'text-black bg-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.5)] border-amber-400 ring-1 ring-amber-500/50 font-black';
            else if(posClean === '2' || posClean === '3') badgeColor = 'text-black bg-zinc-300 shadow-md border-transparent font-black';
            else if(parseInt(posClean) && parseInt(posClean) <= 10) badgeColor = 'text-cyan-400 bg-cyan-950/50 border border-cyan-500/30';
            else if(['DNF', 'DNS', 'OTL', 'DSQ'].includes(posClean)) badgeColor = 'text-red-400 bg-red-950/50 border border-red-500/30';

            let fontSize = posClean.length > 2 ? 'text-[9px]' : 'text-[11px]';
            let suffix = parseInt(posClean) ? 'º' : '';
            return `<div class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg font-bold font-mono ${fontSize} ${badgeColor} transition-all">${posClean}${suffix}</div>`;
        }

        function getColorForStat(val) {
            if (val >= 90) return { bg: 'bg-rose-500', text: 'text-rose-500', shadow: 'shadow-[0_0_15px_rgba(244,63,94,0.4)]', border: 'border-rose-500/50' };
            if (val >= 87) return { bg: 'bg-fuchsia-500', text: 'text-fuchsia-400', shadow: 'shadow-[0_0_15px_rgba(217,70,239,0.4)]', border: 'border-fuchsia-500/50' };
            if (val >= 84) return { bg: 'bg-amber-500', text: 'text-amber-400', shadow: 'shadow-[0_0_15px_rgba(245,158,11,0.4)]', border: 'border-amber-500/50' };
            if (val >= 80) return { bg: 'bg-emerald-500', text: 'text-emerald-400', shadow: 'shadow-[0_0_15px_rgba(16,185,129,0.4)]', border: 'border-emerald-500/50' };
            return { bg: 'bg-cyan-500', text: 'text-cyan-400', shadow: 'shadow-[0_0_15px_rgba(6,182,212,0.4)]', border: 'border-cyan-500/50' };
        }

        window.renderCalendario = function(year) {
            const tabs = document.querySelectorAll('.year-tab-btn');
            tabs.forEach(btn => {
                if(btn.dataset.year === year) btn.className = 'year-tab-btn px-4 py-1.5 text-xs font-bold font-mono rounded-md transition-all bg-cyan-500/20 text-cyan-400 shadow-sm border border-cyan-500/30';
                else btn.className = 'year-tab-btn px-4 py-1.5 text-xs font-bold font-mono rounded-md transition-all text-zinc-500 hover:text-zinc-300 hover:bg-white/5 border border-transparent';
            });

            const container = document.getElementById('palmares-container');
            const races = window.riderCalendarioGlobal[year];
            
            if (!races || races.length === 0) {
                container.innerHTML = `<p class="text-sm font-mono text-zinc-500 text-center italic mt-10">Sin datos registrados en ${year}</p>`;
                return;
            }

            let html = '';
            races.forEach(race => {
                const hasStages = race.stages && race.stages.length > 0;
                
                html += `
                <div class="accordion-item shrink-0 bg-gradient-to-r from-zinc-900 to-zinc-950/80 border border-zinc-800/80 rounded-xl overflow-hidden hover:border-cyan-500/40 transition-all duration-300 shadow-md hover:shadow-[0_0_15px_rgba(6,182,212,0.15)] group">
                    <button onclick="this.parentElement.classList.toggle('active')" class="w-full flex items-center justify-between p-3 focus:outline-none">
                        <div class="flex items-center gap-4">
                            ${getBadgeHTML(race.gc)}
                            <span class="text-sm md:text-base font-black text-white tracking-tight text-left leading-snug group-hover:text-cyan-400 transition-colors drop-shadow-sm">${race.raceName}</span>
                        </div>
                        ${hasStages ? `<i class="fas fa-chevron-down text-zinc-500 accordion-icon transition-all bg-zinc-800/80 w-7 h-7 rounded-full flex items-center justify-center border border-zinc-700 group-hover:text-cyan-400 group-hover:border-cyan-900 shadow-inner"></i>` : `<span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest bg-zinc-800/80 px-2 py-1 rounded border border-zinc-700 shadow-inner">1 Día</span>`}
                    </button>
                    
                    ${hasStages ? `
                    <div class="accordion-content bg-black/80 border-t border-zinc-800/50">
                        <div class="flex flex-col gap-2 p-3 relative">
                            <div class="absolute left-[1.6rem] top-4 bottom-4 w-0.5 bg-gradient-to-b from-zinc-700 via-zinc-800 to-transparent rounded-full"></div>
                            
                            ${race.stages.map((stage, idx) => {
                                let stageText = stage.stage;
                                let stageLower = stageText.toLowerCase();
                                
                                let iconHTML = '<i class="fas fa-road text-zinc-600"></i>';
                                if (stageLower.includes('montaña') || stageLower.includes('mountain') || stageLower.includes('alto')) iconHTML = '<i class="fas fa-mountain text-rose-500 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]"></i>';
                                else if (stageLower.includes('crono') || stageLower.includes('tt') || stageLower.includes('time trial')) iconHTML = '<i class="fas fa-stopwatch text-cyan-400 drop-shadow-[0_0_5px_rgba(34,211,238,0.5)]"></i>';
                                else if (stageLower.includes('media') || stageLower.includes('colinas')) iconHTML = '<i class="fas fa-hill-rockslide text-amber-500 drop-shadow-[0_0_5px_rgba(245,158,11,0.5)]"></i>';
                                else if (stageLower.includes('llano') || stageLower.includes('flat')) iconHTML = '<i class="fas fa-road text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.5)]"></i>';

                                let posNum = parseInt(stage.pos);
                                let dotClass = 'bg-zinc-600 ring-black';
                                if (posNum === 1) dotClass = 'bg-amber-400 ring-amber-900/50 shadow-[0_0_8px_rgba(251,191,36,0.8)]';
                                else if (posNum === 2 || posNum === 3) dotClass = 'bg-zinc-300 ring-zinc-700 shadow-[0_0_5px_rgba(212,212,216,0.5)]';
                                else if (posNum <= 10) dotClass = 'bg-cyan-500 ring-cyan-900/50 shadow-[0_0_5px_rgba(6,182,212,0.5)]';

                                let kmMatch = stageText.match(/(\d+(?:\.\d+)?)\s*km/i);
                                let mMatch = stageText.match(/(\d+)\s*m\s*desnivel/i) || stageText.match(/-\s*(\d+)\s*m/i) || stageText.match(/(\d{2,5})\s*m/i);
                                
                                let tagsHTML = '';
                                if (kmMatch) tagsHTML += `<span class="bg-zinc-800/80 border border-zinc-700 text-zinc-200 text-[10px] sm:text-xs px-2 py-0.5 rounded font-mono shadow-sm font-bold">${kmMatch[1]} KM</span>`;
                                if (mMatch) tagsHTML += `<span class="bg-zinc-800/80 border border-zinc-700 text-zinc-200 text-[10px] sm:text-xs px-2 py-0.5 rounded font-mono shadow-sm font-bold"><i class="fas fa-arrow-trend-up text-zinc-400 mr-1"></i>${mMatch[1]} M</span>`;

                                let cleanTitle = stageText;
                                if (kmMatch) cleanTitle = cleanTitle.replace(kmMatch[0], '');
                                if (mMatch) cleanTitle = cleanTitle.replace(mMatch[0], '');
                                
                                cleanTitle = cleanTitle.replace(/\b(llano|montaña|media|crono|tt|time trial|desnivel)\b/gi, '')
                                                       .replace(/^[-\s>]+|[-\s>]+$/g, '') 
                                                       .replace(/\s{2,}/g, ' ') 
                                                       .trim();

                                return `
                                <div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-zinc-900/80 transition-colors relative z-10 ml-6 border border-transparent hover:border-zinc-800/50 group/stage">
                                    <div class="absolute -left-[1.45rem] top-1/2 transform -translate-y-1/2 w-2 h-2 rounded-full ${dotClass} ring-4 transition-transform group-hover/stage:scale-125"></div>
                                    
                                    <div class="flex flex-col pr-4 overflow-hidden">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="w-4 text-center shrink-0 text-[10px]">${iconHTML}</span>
                                            <span class="text-xs text-zinc-300 font-bold truncate">${cleanTitle || stageText}</span>
                                        </div>
                                        ${tagsHTML ? `<div class="flex gap-1.5 ml-6 mt-0.5">${tagsHTML}</div>` : ''}
                                    </div>
                                    
                                    <div class="shrink-0 flex items-center justify-center">
                                        ${getBadgeHTML(stage.pos)}
                                    </div>
                                </div>
                                `
                            }).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
                `;
            });
            
            container.innerHTML = html;
        };

        async function loadRiderProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const riderNameQuery = urlParams.get('rider');
            if (!riderNameQuery) {
                // Si alguien entra a ciclistas.html sin nombre, redirigir a inicio o mostrar error
                document.getElementById('skeleton-loader').innerHTML = '<p class="text-center text-white p-20">Ciclista no especificado.</p>';
                return;
            }

            const rawName = decodeURIComponent(riderNameQuery);
            const normalizedRawName = normalizeName(rawName);
            
            const formattedName = formatDisplayRiderName(rawName);
            document.getElementById('rider-name').innerText = formattedName;
            
            document.getElementById('rider-image').src = `https://res.cloudinary.com/dr1c3gqwf/image/upload/f_auto,q_auto/${getSlug(rawName)}.png`;

            try {
                const response = await fetch('/api/home');
                const data = await response.json();

                let riderData = null; let nat = null; let spec = null; let age = null; let jerseyUrl = null;
                let weight = null; let height = null;
                let riderStats = [];
                let globalStat = null;

                const ranking = data.ranking.sort((a,b) => b.points - a.points);
                const riderRankIndex = ranking.findIndex(r => isSameRider(r.name, rawName));
                
                if (riderRankIndex !== -1) {
                    riderData = ranking[riderRankIndex];
                    document.getElementById('rider-points').innerText = riderData.points;
                    
                    const dbRank = riderData.rank || riderData.ranking || riderData.posicion || riderData.pos;
                    const finalRank = dbRank ? dbRank : (riderRankIndex + 1);
                    document.getElementById('rider-rank').innerText = `#${finalRank}`;

                    document.getElementById('rider-team').innerText = riderData.team;
                    
                    if (riderData.palmares && typeof riderData.palmares === 'string' && riderData.palmares.includes('|')) {
                        try {
                            const lines = riderData.palmares.split('\n').filter(l => l.trim().length > 0);
                            const yearMap = {}; 
                            
                            lines.forEach(line => {
                                const parts = line.split('|').map(p => p.trim());
                                if(parts.length >= 3) {
                                    const y = parts[0]; 
                                    const p = parts[1]; 
                                    const rawRace = parts[2];
                                    
                                    if(!yearMap[y]) yearMap[y] = new Map();

                                    let mainRace = rawRace;
                                    let subInfo = null;
                                    
                                    const splitIndex = rawRace.indexOf(' - ');
                                    if (splitIndex > -1) {
                                        mainRace = rawRace.substring(0, splitIndex).trim();
                                        subInfo = rawRace.substring(splitIndex + 3).trim();
                                    }

                                    if (!yearMap[y].has(mainRace)) {
                                        yearMap[y].set(mainRace, { raceName: mainRace, gc: null, stages: [] });
                                    }
                                    
                                    const entry = yearMap[y].get(mainRace);

                                    if (!subInfo || subInfo.toLowerCase() === 'general' || subInfo.toLowerCase() === 'gc') {
                                        entry.gc = p;
                                    } else {
                                        entry.stages.push({ stage: subInfo, pos: p });
                                    }
                                }
                            });

                            const finalYearMap = {};
                            for (const [y, map] of Object.entries(yearMap)) {
                                finalYearMap[y] = Array.from(map.values());
                            }

                            const yearsAvailable = Object.keys(finalYearMap).sort().reverse();
                            if (yearsAvailable.length > 0) {
                                window.riderCalendarioGlobal = finalYearMap;
                                
                                const tabsContainer = document.getElementById('year-tabs');
                                tabsContainer.innerHTML = yearsAvailable.map(y => `
                                    <button onclick="renderCalendario('${y}')" data-year="${y}" class="year-tab-btn px-4 py-1.5 text-xs font-bold font-mono rounded-md transition-all text-zinc-500">${y}</button>
                                `).join('');

                                window.renderCalendario(yearsAvailable[0]);
                            }
                        } catch(e) { console.error("Error agrupando palmarés", e); }
                    } else {
                        document.getElementById('palmares-container').innerHTML = `<p class="text-sm font-mono text-zinc-500 text-center italic px-4 mt-10">Esperando datos manuales desde el Panel de Control...</p>`;
                    }
                } else {
                    document.getElementById('rider-points').innerText = "0";
                    document.getElementById('rider-rank').innerText = "--";
                    
                    const td = data.trending.find(t => t.tipo.toLowerCase() === 'ciclista' && isSameRider(t.title, rawName));
                    document.getElementById('rider-team').innerText = td ? td.subtitle : "Pro Rider";
                }

                if (data.teams) {
                    for (const team of data.teams) {
                        let rList = [];
                        try { rList = typeof team.riders === 'string' ? JSON.parse(team.riders) : team.riders; } catch(e){}
                        if (Array.isArray(rList)) {
                            const r = rList.find(x => isSameRider(x.name, rawName));
                            if (r) {
                                nat = r.country; age = r.age; spec = r.type;
                                weight = r.weight || r.peso || null;
                                height = r.height || r.altura || null;
                                
                                if(!riderData) document.getElementById('rider-team').innerText = team.name;
                                jerseyUrl = team.jersey;
                                
                                if (r.stats) {
                                    if (r.stats.mnt) riderStats.push({ name: 'Montaña', val: r.stats.mnt });
                                    if (r.stats.spr) riderStats.push({ name: 'Sprint', val: r.stats.spr });
                                    if (r.stats.tt) riderStats.push({ name: 'Crono', val: r.stats.tt });
                                    if (r.stats.lla) riderStats.push({ name: 'Llano', val: r.stats.lla });
                                    if (r.stats.res) riderStats.push({ name: 'Resistencia', val: r.stats.res });
                                    if (r.stats.rec) riderStats.push({ name: 'Recuperación', val: r.stats.rec });
                                    
                                    if (r.stats.ovr) globalStat = parseInt(r.stats.ovr);
                                }
                                break; 
                            }
                        }
                    }
                }

                // Renderizamos Nacionalidad y Edad con Banderas Mágicas
                let natAgeText = nat ? `<span class="text-xl">${getFlag(nat)}</span> ${nat}` : '--';
                if (age) natAgeText += ` <span class="text-zinc-500 text-xs font-mono ml-2 border border-zinc-700 bg-zinc-900/50 px-1.5 py-0.5 rounded">${age} años</span>`;
                document.getElementById('rider-nat').innerHTML = natAgeText;
                document.getElementById('rider-spec').innerText = spec || '--';

                let bioText = '--';
                if (height && weight) bioText = `${height} <span class="text-zinc-500">/</span> ${weight}`;
                else if (height) bioText = `${height}`;
                else if (weight) bioText = `${weight}`;
                document.getElementById('rider-bio').innerHTML = bioText;

                if (jerseyUrl) {
                    const jC = document.getElementById('rider-jersey-container');
                    jC.classList.remove('hidden');
                    document.getElementById('rider-jersey').src = jerseyUrl;
                }

                if (riderStats.length > 0 || globalStat) {
                    const statsContainer = document.getElementById('rider-stats-container');
                    const statsFlex = document.getElementById('rider-stats-flex');
                    
                    let globalHtml = '';
                    if (globalStat) {
                        const gColor = getColorForStat(globalStat);
                        globalHtml = `
                            <div class="shrink-0 flex flex-col items-center justify-center w-28 h-28 md:w-36 md:h-36 rounded-full border-4 ${gColor.border} bg-zinc-950 shadow-inner relative ${gColor.shadow}">
                                <span class="text-4xl md:text-5xl font-black ${gColor.text} drop-shadow-md leading-none">${globalStat}</span>
                                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 mt-1">Global</span>
                            </div>
                        `;
                    }

                    let barsHtml = '<div class="flex-1 w-full grid grid-cols-2 gap-x-6 md:gap-x-10 gap-y-4 md:gap-y-6">';
                    riderStats.forEach(stat => {
                        const val = parseInt(stat.val);
                        const percentage = Math.min(100, Math.max(0, val));
                        const color = getColorForStat(val); 

                        barsHtml += `
                            <div class="flex flex-col gap-1.5 md:gap-2">
                                <div class="flex justify-between text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-400">
                                    <span>${stat.name}</span>
                                    <span class="text-white font-black">${val}</span>
                                </div>
                                <div class="h-2 md:h-2.5 w-full bg-zinc-800/80 rounded-full overflow-hidden border border-zinc-700/50">
                                    <div class="h-full ${color.bg} rounded-full transition-all duration-[1500ms] ease-out w-0" data-width="${percentage}%"></div>
                                </div>
                            </div>
                        `;
                    });
                    barsHtml += '</div>';

                    statsFlex.innerHTML = globalHtml + barsHtml;
                    statsContainer.classList.remove('hidden');
                }

                const trendData = data.trending.find(t => t.tipo.toLowerCase() === 'ciclista' && isSameRider(t.title, rawName));
                if (trendData) {
                    const val = trendData.value ? trendData.value.toLowerCase() : '';
                    const isNegative = val.includes('-') || val.includes('baja') || val.includes('down') || val.includes('lesi');
                    const trendBox = document.getElementById('rider-trend');
                    trendBox.classList.remove('hidden');
                    if (isNegative) {
                        trendBox.className = "px-3 py-1.5 rounded-lg border font-mono text-xs font-bold uppercase tracking-widest shrink-0 bg-red-900/20 border-red-500/30 text-red-400 shadow-lg";
                        trendBox.innerHTML = `<i class="fas fa-arrow-down mr-1"></i> ${trendData.value || 'BAJA / LESIÓN'}`;
                    } else {
                        trendBox.className = "px-3 py-1.5 rounded-lg border font-mono text-xs font-bold uppercase tracking-widest shrink-0 bg-emerald-900/20 border-emerald-500/30 text-emerald-400 shadow-lg";
                        trendBox.innerHTML = `<i class="fas fa-fire mr-1"></i> ${trendData.value || 'EN FORMA'}`;
                    }
                }

            } catch (error) {
                console.error("Error cargando el perfil principal:", error);
            }

            try {
                const relatedNewsContainer = document.getElementById('related-news');
                const newsRes = await fetch('/api/news');
                const allNews = await newsRes.json();

                if (allNews && allNews.length > 0) {
                    const nameParts = normalizedRawName.split(' ');
                    let searchKey = nameParts[nameParts.length - 1];
                    if (searchKey.length <= 3 && nameParts.length > 1) {
                        searchKey = nameParts[nameParts.length - 2]; 
                    }
                    
                    const mentionedNews = allNews.filter(n => {
                        const fullText = (n.title + " " + (n.lead||"") + " " + (n.content||"")).toLowerCase();
                        return fullText.includes(searchKey); 
                    });

                    if (mentionedNews.length > 0) {
                        relatedNewsContainer.innerHTML = mentionedNews.slice(0, 5).map(n => `
                            <a href="noticias.html?article=${n.id}" class="flex items-center gap-4 group border-b border-zinc-800/50 pb-4 mb-4 last:border-0 last:pb-0 last:mb-0">
                                <div class="w-14 h-14 shrink-0 rounded-xl overflow-hidden border border-zinc-700 bg-zinc-800 relative shadow-md">
                                    <img src="${n.image || 'assets/default-news.jpg'}" alt="News" class="absolute inset-0 w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500">
                                </div>
                                <div class="flex-1">
                                    <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest block mb-1">${n.tag || 'News'} • ${n.date || ''}</span>
                                    <h4 class="text-xs md:text-sm font-bold text-zinc-300 group-hover:text-white transition-colors leading-snug line-clamp-2">${n.title}</h4>
                                </div>
                            </a>
                        `).join('');
                    } else {
                        relatedNewsContainer.innerHTML = `<p class="text-xs text-zinc-500 font-mono mt-4">No hay menciones recientes en el archivo.</p>`;
                    }
                } else {
                    relatedNewsContainer.innerHTML = `<p class="text-xs text-zinc-500 font-mono mt-4">La base de datos de noticias está vacía.</p>`;
                }
            } catch (newsError) {
                console.error("Error extrayendo noticias:", newsError);
                document.getElementById('related-news').innerHTML = `<p class="text-xs text-red-500 font-mono mt-4">Error conectando con el servidor de noticias.</p>`;
            }

            // APAGAMOS EL SKELETON Y MOSTRAMOS EL PERFIL REAL
            document.getElementById('skeleton-loader').classList.add('hidden');
            const realProfile = document.getElementById('real-profile');
            realProfile.classList.remove('hidden');
            
            // Un pequeño delay para que el navegador renderice y aplique la opacidad
            setTimeout(() => {
                realProfile.classList.remove('opacity-0');
                
                // Disparamos la animación de las barras
                document.querySelectorAll('#rider-stats-grid .h-full, #rider-stats-flex .h-full').forEach(bar => {
                    if (bar.hasAttribute('data-width')) {
                        bar.style.width = bar.getAttribute('data-width');
                    }
                });
            }, 50);
        }

        document.addEventListener('DOMContentLoaded', loadRiderProfile);
    </script>
</body>
</html>
