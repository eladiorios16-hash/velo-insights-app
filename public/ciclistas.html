<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Ciclista | VELO INSIGHTS</title>
    <link rel="icon" type="image/png" sizes="144x144" href="/assets/favicon-144.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .bg-grid-pattern { background-image: radial-gradient(rgba(34, 211, 238, 0.1) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-[#050505] antialiased text-slate-300 pb-20 selection:bg-cyan-500/30 selection:text-cyan-200">

    <nav class="fixed top-0 w-full bg-black/80 backdrop-blur-md border-b border-zinc-800 z-50 px-4 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-cyan-400 transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-arrow-left"></i> Volver al Lab
            </a>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500">Rider Data Center</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-28 pb-12">
        <div class="relative bg-zinc-900/40 border border-zinc-800 rounded-3xl p-6 md:p-10 overflow-hidden shadow-2xl mb-8 flex flex-col md:flex-row items-center md:items-start gap-8">
            <div class="absolute top-0 right-0 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="w-32 h-32 md:w-48 md:h-48 shrink-0 rounded-full overflow-hidden border-2 border-zinc-700 shadow-[0_0_30px_rgba(0,0,0,0.5)] relative z-10 bg-zinc-800 flex items-center justify-center">
                <img id="rider-image" src="" alt="Rider" class="w-full h-full object-cover object-top" onerror="this.src='https://res.cloudinary.com/dr1c3gqwf/image/upload/f_auto,q_auto/default.png';">
            </div>

            <div class="relative z-10 text-center md:text-left flex-1 w-full">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-2">
                    <div>
                        <h1 id="rider-name" class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter italic leading-none mb-1">Cargando...</h1>
                        
                        <div class="flex items-center justify-center md:justify-start gap-3 mt-2">
                            <div id="rider-jersey-container" class="hidden shrink-0 w-6 h-6 overflow-hidden rounded shadow-sm border border-zinc-700">
                                <img id="rider-jersey" src="" alt="Jersey" class="w-full h-full object-cover">
                            </div>
                            <p id="rider-team" class="text-sm md:text-base font-mono text-cyan-400 uppercase tracking-widest leading-none pt-1">Buscando equipo...</p>
                        </div>
                    </div>
                    <div id="rider-trend" class="hidden px-3 py-1.5 rounded-lg border font-mono text-xs font-bold uppercase tracking-widest shrink-0 mt-4 md:mt-0">
                        </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mt-8 border-t border-zinc-800/60 pt-6">
                    <div>
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black mb-1">Puntos UCI</p>
                        <p id="rider-points" class="text-2xl md:text-3xl font-black text-amber-500 leading-none">--</p>
                    </div>
                    <div class="md:border-l border-zinc-800 md:pl-6">
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black mb-1">Ranking</p>
                        <p id="rider-rank" class="text-2xl md:text-3xl font-black text-white leading-none">--</p>
                    </div>
                    <div class="md:border-l border-zinc-800 md:pl-6">
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black mb-1">País / Edad</p>
                        <p id="rider-nat" class="text-base md:text-lg font-bold text-zinc-200 leading-none mt-1">--</p>
                    </div>
                    <div class="md:border-l border-zinc-800 md:pl-6">
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black mb-1">Especialidad</p>
                        <p id="rider-spec" class="text-base md:text-lg font-bold text-zinc-200 leading-none mt-1">--</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-gradient-to-br from-zinc-900/80 to-[#050505] border border-zinc-800 rounded-2xl p-6 relative overflow-hidden bg-grid-pattern h-full">
                    <div class="flex items-center gap-3 mb-6 border-b border-zinc-800/60 pb-3">
                        <i class="fas fa-trophy text-amber-500"></i>
                        <h2 class="text-lg font-black text-white italic uppercase tracking-tight">Palmarés / <span class="text-amber-500">Victorias Destacadas</span></h2>
                    </div>
                    
                    <div id="palmares-container" class="min-h-[150px] flex flex-col items-center justify-center">
                        <i class="fas fa-spinner fa-spin text-2xl text-cyan-500 mb-3"></i>
                        <p class="text-xs font-mono text-zinc-500">Leyendo base de datos central...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-zinc-900/40 border border-zinc-800 rounded-2xl p-6 h-full">
                    <div class="flex items-center gap-3 mb-6 border-b border-zinc-800/60 pb-3">
                        <i class="fas fa-newspaper text-cyan-400"></i>
                        <h2 class="text-base font-black text-white italic uppercase tracking-tight">Noticias <span class="text-cyan-400">Menciones</span></h2>
                    </div>
                    
                    <div id="related-news" class="space-y-4">
                        <p class="text-xs text-zinc-500 animate-pulse font-mono">Buscando en el archivo...</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function normalizeName(name) {
            if (!name) return '';
            return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function getSlug(name) {
            let slug = normalizeName(name);
            return slug.replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
        }

        async function loadRiderProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const riderNameQuery = urlParams.get('rider');
            
            if (!riderNameQuery) {
                document.getElementById('rider-name').innerText = "Ciclista no encontrado";
                return;
            }

            const rawName = decodeURIComponent(riderNameQuery);
            const normalizedRawName = normalizeName(rawName);
            
            document.getElementById('rider-name').innerText = rawName;
            
            const imgUrl = `https://res.cloudinary.com/dr1c3gqwf/image/upload/f_auto,q_auto/${getSlug(rawName)}.png`;
            document.getElementById('rider-image').src = imgUrl;

            try {
                const response = await fetch('/api/home');
                const data = await response.json();

                let riderData = null;
                let nat = null;
                let spec = null;
                let age = null;
                let jerseyUrl = null;

                // --- BUSCAR EN EL RANKING ---
                const ranking = data.ranking.sort((a,b) => b.points - a.points);
                const riderRankIndex = ranking.findIndex(r => {
                    const normRiderDB = normalizeName(r.name);
                    const partsRaw = normalizedRawName.split(' ');
                    return normRiderDB === normalizedRawName || partsRaw.every(word => normRiderDB.includes(word));
                });
                
                if (riderRankIndex !== -1) {
                    riderData = ranking[riderRankIndex];
                    document.getElementById('rider-points').innerText = riderData.points;
                    document.getElementById('rider-rank').innerText = `#${riderRankIndex + 1}`;
                    document.getElementById('rider-team').innerText = riderData.team;
                    
                    // Extraer palmarés
                    const palmaresContainer = document.getElementById('palmares-container');
                    if (riderData.palmares) {
                        try {
                            const wins = typeof riderData.palmares === 'string' ? JSON.parse(riderData.palmares) : riderData.palmares;
                            if (wins && wins.length > 0) {
                                palmaresContainer.className = "grid grid-cols-1 md:grid-cols-2 gap-4 pt-2";
                                palmaresContainer.innerHTML = wins.map(win => `
                                    <div class="flex items-start gap-3 p-3 bg-zinc-950/80 border border-zinc-800 rounded-xl hover:border-amber-500/30 transition-colors shadow-lg">
                                        <i class="fas fa-medal text-amber-500 mt-1"></i>
                                        <span class="text-sm text-zinc-300 font-bold leading-snug">${win}</span>
                                    </div>
                                `).join('');
                            } else {
                                palmaresContainer.className = "min-h-[150px] flex flex-col items-center justify-center opacity-70";
                                palmaresContainer.innerHTML = `<p class="text-sm font-mono text-zinc-500 text-center italic">No hay victorias principales registradas en la última temporada.</p>`;
                            }
                        } catch(e) {
                            console.error("Error leyendo palmarés", e);
                        }
                    } else {
                        palmaresContainer.className = "min-h-[150px] flex flex-col items-center justify-center opacity-70";
                        palmaresContainer.innerHTML = `
                            <i class="fas fa-satellite-dish text-2xl text-cyan-500 mb-3 animate-ping"></i>
                            <p class="text-xs font-mono text-zinc-400 text-center">El bot está indexando el palmarés histórico. Vuelve pronto.</p>
                        `;
                    }
                } else {
                    document.getElementById('rider-points').innerText = "0";
                    document.getElementById('rider-rank').innerText = "--";
                    const teamFromTrending = data.trending.find(t => t.tipo.toLowerCase() === 'ciclista' && normalizeName(t.title) === normalizedRawName);
                    document.getElementById('rider-team').innerText = teamFromTrending ? teamFromTrending.subtitle : "Pro Rider";
                    document.getElementById('palmares-container').innerHTML = `<p class="text-xs font-mono text-zinc-500">Corredor sin historial registrado actualmente.</p>`;
                }

                // --- BUSCAR EN LA TABLA DE EQUIPOS (Nacionalidad, Edad, Especialidad y Maillot) ---
                if (data.teams) {
                    for (const team of data.teams) {
                        if (team.riders && Array.isArray(team.riders)) {
                            // Buscar coincidencia de nombre
                            const r = team.riders.find(x => normalizeName(x.name) === normalizedRawName || normalizeName(x.name).includes(normalizedRawName.split(' ').pop()));
                            
                            if (r) {
                                // Mapeamos exacto como lo tienes en el JSON de admin
                                nat = r.country;
                                age = r.age;
                                spec = r.type;
                                
                                // Si no está el equipo en el ranking, lo cogemos de aquí
                                if(!riderData) document.getElementById('rider-team').innerText = team.name;

                                // Guardamos el maillot del equipo
                                jerseyUrl = team.jersey;
                                break; // Paramos el bucle, ya lo encontramos
                            }
                        }
                    }
                }

                // Escribir Nacionalidad y Edad (Ej. "🇨🇴 28 años")
                let natAgeText = '';
                if (nat) natAgeText += nat;
                if (age) natAgeText += ` <span class="text-zinc-500 text-xs font-mono ml-1">${age} años</span>`;
                document.getElementById('rider-nat').innerHTML = natAgeText || 'N/D';
                
                // Escribir Especialidad
                document.getElementById('rider-spec').innerText = spec || 'N/D';

                // Pintar Maillot si existe
                if (jerseyUrl) {
                    const jC = document.getElementById('rider-jersey-container');
                    jC.classList.remove('hidden');
                    document.getElementById('rider-jersey').src = jerseyUrl;
                }

                // --- BUSCAR EN EL ESTADO DE FORMA (TRENDING) ---
                const trendData = data.trending.find(t => t.tipo.toLowerCase() === 'ciclista' && normalizeName(t.title) === normalizedRawName);
                if (trendData) {
                    const val = trendData.value ? trendData.value.toLowerCase() : '';
                    const isNegative = val.includes('-') || val.includes('baja') || val.includes('down') || val.includes('lesi');
                    const trendBox = document.getElementById('rider-trend');
                    
                    trendBox.classList.remove('hidden');
                    if (isNegative) {
                        trendBox.className = "px-3 py-1.5 rounded-lg border font-mono text-xs font-bold uppercase tracking-widest shrink-0 bg-red-900/20 border-red-500/30 text-red-400";
                        trendBox.innerHTML = `<i class="fas fa-arrow-down mr-1"></i> ${trendData.value || 'BAJA / LESIÓN'}`;
                    } else {
                        trendBox.className = "px-3 py-1.5 rounded-lg border font-mono text-xs font-bold uppercase tracking-widest shrink-0 bg-emerald-900/20 border-emerald-500/30 text-emerald-400";
                        trendBox.innerHTML = `<i class="fas fa-fire mr-1"></i> ${trendData.value || 'EN FORMA'}`;
                    }
                }

                // --- BUSCAR MENCIONES EN NOTICIAS ---
                const relatedNewsContainer = document.getElementById('related-news');
                const mentionedNews = data.news.filter(n => {
                    const fullText = (n.title + " " + (n.lead||"") + " " + (n.excerpt||"")).toLowerCase();
                    const lastName = normalizedRawName.split(' ').pop();
                    return fullText.includes(lastName); 
                });

                if (mentionedNews.length > 0) {
                    relatedNewsContainer.innerHTML = mentionedNews.map(n => `
                        <a href="noticias.html?article=${n.id}" class="block group border-b border-zinc-800/50 pb-3 last:border-0 last:pb-0">
                            <span class="text-[8px] font-black text-cyan-600 uppercase tracking-widest block mb-1">${n.tag || 'News'} • ${n.date || ''}</span>
                            <h4 class="text-xs font-bold text-zinc-300 group-hover:text-white transition-colors leading-snug">${n.title}</h4>
                        </a>
                    `).join('');
                } else {
                    relatedNewsContainer.innerHTML = `<p class="text-xs text-zinc-600 italic">No hay noticias recientes sobre este corredor en el archivo.</p>`;
                }

            } catch (error) {
                console.error("Error cargando perfil:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadRiderProfile);
    </script>
</body>
</html>
