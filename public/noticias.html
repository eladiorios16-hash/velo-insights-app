        <div class="max-w-xl relative group px-2 md:px-0">

                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="w-full max-w-5xl bg-[#050505] md:border border-zinc-800 md:rounded-[2rem] overflow-hidden relative shadow-[0_0_50px_rgba(0,0,0,0.8)] pb-20 md:pb-10" id="modal-content"></div>
        </div>

    <script src="layout.js?v=7.2"></script>
    <script>
        function generateSlug(text) {
            if (!text) return 'velo-insight';
            return text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        }

        function interceptCloudinaryImages(htmlContent) {
            if (!htmlContent) return '';
            const cloudName = 'dr1c3gqwf';
            return htmlContent.replace(/src=["'](assets\/ciclistas\/([^"']+))["']/g, (match, path, filename) => {
                return `src="https://res.cloudinary.com/${cloudName}/image/upload/ciclistas/${filename}"`;
            });
        }

        let allNews = [];
        let allGlossary = []; 
        
        const feed = document.getElementById('news-feed');
        const modal = document.getElementById('article-modal');
        const modalContent = document.getElementById('modal-content');
        const searchInput = document.getElementById('news-search');
        const progressBar = document.getElementById('reading-progress-bar');
        const progressContainer = document.getElementById('reading-progress-container');

        const TAG_COLORS = {
            'TECH LAB': { bg: 'bg-emerald-500', text: 'text-black', shadow: 'shadow-emerald-500/20' },
            'AERO LAB': { bg: 'bg-pink-500', text: 'text-white', shadow: 'shadow-pink-500/20' },
            'DATA ANALYSIS': { bg: 'bg-violet-500', text: 'text-white', shadow: 'shadow-violet-500/20' },
            'RACE REPORT': { bg: 'bg-cyan-500', text: 'text-black', shadow: 'shadow-cyan-500/20' },
            'PREVIA': { bg: 'bg-yellow-500', text: 'text-black', shadow: 'shadow-yellow-500/20' },
            'DEFAULT': { bg: 'bg-zinc-700', text: 'text-white', shadow: 'shadow-zinc-700/20' }
        };

        function getReadingTime(htmlContent) {
            if (!htmlContent) return 1;
            const text = htmlContent.replace(/<[^>]*>?/gm, ''); 
            const words = text.trim().split(/\s+/).length;
            const time = Math.ceil(words / 220); 
            return time < 1 ? 1 : time;
        }

        function getTechnicalLevel(time) {
            if (time < 3) return 'Básico';
            if (time < 6) return 'Intermedio';
            return 'Avanzado';
        }

        function showSkeletons() {
            feed.innerHTML = `
                <div class="border-b border-zinc-900/80 pb-10 mb-10 animate-pulse">
                    <div class="w-full aspect-[4/3] md:aspect-[21/9] bg-zinc-800 rounded-2xl md:rounded-[2rem] mb-5"></div>
                    <div class="flex gap-2 mb-3"><div class="h-3 w-16 bg-zinc-800 rounded"></div><div class="h-3 w-20 bg-zinc-800 rounded"></div></div>
                    <div class="h-10 w-3/4 bg-zinc-800 rounded-xl mb-3"></div>
                    <div class="h-4 w-full bg-zinc-800 rounded mb-2"></div>
                </div>
            `;
        }

        async function fetchNews() {
            showSkeletons(); 
            try {
                const [resNews, resGlos] = await Promise.all([
                    fetch('/api/news').catch(() => null),
                    fetch('/api/glossary').catch(() => null)
                ]);

                if (resGlos && resGlos.ok) allGlossary = await resGlos.json();
                if (resNews && resNews.ok) {
                    const data = await resNews.json();
                    if (data && data.length > 0) {
                        allNews = data.sort((a, b) => b.id - a.id); 
                        renderHubs();
                        
                        let articleId = new URLSearchParams(window.location.search).get('article');
                        if (!articleId && window.location.pathname.startsWith('/noticia/')) {
                            const parts = window.location.pathname.split('/');
                            articleId = parts[2]; 
                        }

                        if (articleId) setTimeout(() => openArticle(articleId), 200);
                        return;
                    }
                }
                feed.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-server text-4xl text-zinc-800 mb-4"></i>
                        <p class="text-zinc-500 font-mono text-xs uppercase tracking-widest">Base de datos vacía.</p>
                    </div>`;
            } catch (error) {
                feed.innerHTML = `<p class="text-zinc-500 text-center py-20 font-mono text-xs uppercase tracking-widest">Error de conexión.</p>`;
            }
        }

        searchInput.addEventListener('input', () => { renderHubs(); });

        function buildVerticalCard(news) {
            const tagData = TAG_COLORS[(news.tag || '').toUpperCase()] || TAG_COLORS['DEFAULT'];
            const readTime = getReadingTime(news.content);
            const slug = generateSlug(news.title);
            const newsUrl = `/noticia/${news.id}/${slug}`;
            
            return `
                <a href="${newsUrl}" onclick="event.preventDefault(); openArticle('${news.id}')" class="block group cursor-pointer snap-start shrink-0 w-[85vw] md:w-[320px] lg:w-[350px] bg-zinc-900/30 border border-zinc-800/80 rounded-2xl overflow-hidden hover:border-cyan-500/50 hover:bg-zinc-900/80 transition-all flex flex-col h-full shadow-lg hover:shadow-cyan-500/5">
                    <div class="aspect-[16/9] w-full overflow-hidden relative border-b border-zinc-800/50">
                        <img src="${news.image || 'assets/placeholder.jpg'}" loading="lazy" class="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
                        <div class="absolute top-3 left-3"><span class="px-2.5 py-1 ${tagData.bg} ${tagData.text} text-[8px] font-black uppercase rounded shadow-lg tracking-widest">${news.tag || 'INFO'}</span></div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex items-center gap-2 mb-3 flex-wrap">
                            <span class="text-[10px] font-mono font-bold text-zinc-500 tracking-widest uppercase">${news.date || 'HOY'}</span>
                            <span class="w-1 h-1 bg-zinc-800 rounded-full"></span>
                            <span class="text-[10px] font-mono font-bold text-zinc-600 tracking-widest uppercase"><i class="fas fa-stopwatch opacity-70 mr-0.5"></i> ${readTime} MIN</span>
                        </div>
                        <h3 class="text-lg font-black italic text-white uppercase leading-[1.15] group-hover:text-cyan-400 transition-colors tracking-tighter mb-3">${news.title}</h3>
                        <p class="text-zinc-500 text-xs leading-relaxed line-clamp-2 mt-auto">${news.lead || ''}</p>
                    </div>
                </a>
            `;
        }

        function renderHero(hero) {
            const heroTag = TAG_COLORS[(hero.tag || '').toUpperCase()] || TAG_COLORS['DEFAULT'];
            const readTime = getReadingTime(hero.content);
            const techLevel = getTechnicalLevel(readTime);
            const slug = generateSlug(hero.title);
            const heroUrl = `/noticia/${hero.id}/${slug}`;
            
            const vatiosPill = hero.vatios ? `<span class="bg-black/60 backdrop-blur border border-zinc-700/50 text-cyan-400 px-3 py-1.5 rounded-lg shadow-xl font-mono text-[10px] font-black uppercase flex items-center gap-1.5"><i class="fas fa-bolt text-amber-400"></i> ${hero.vatios} W/kg</span>` : '';
            
            return `
                <a href="${heroUrl}" onclick="event.preventDefault(); openArticle('${hero.id}')" class="group cursor-pointer mb-12 md:mb-16 transition-all fade-in-up flex flex-col lg:flex-row gap-6 lg:gap-10 items-stretch border-b border-zinc-900/80 pb-10 md:pb-14">
                    
                    <!-- BLOQUE IMAGEN (60% en PC) -->
                    <div class="w-full lg:w-3/5 aspect-[4/3] md:aspect-[16/9] overflow-hidden rounded-2xl md:rounded-[2rem] bg-zinc-900 relative shadow-xl border border-transparent group-hover:border-zinc-800 transition-colors shrink-0">
                        <img src="${hero.image || 'assets/placeholder.jpg'}" loading="lazy" class="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
                        
                        <div class="absolute top-4 left-4 md:top-6 md:left-6 flex flex-col gap-2">
                            <span class="px-3.5 py-1.5 ${heroTag.bg} ${heroTag.text} text-[10px] md:text-xs font-black uppercase rounded shadow-2xl tracking-widest self-start">${hero.tag || 'INFO'}</span>
                        </div>
                        
                        <div class="absolute bottom-4 right-4 md:bottom-6 md:right-6">
                            ${vatiosPill}
                        </div>
                    </div>
                    
                    <!-- BLOQUE TEXTO (40% en PC) -->
                    <div class="w-full lg:w-2/5 flex flex-col justify-center py-2 md:py-4">
                        <div class="flex items-center gap-3 mb-4 md:mb-6">
                            <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                            <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Última Hora</h3>
                        </div>
                        
                        <h2 class="text-3xl md:text-4xl lg:text-[2.5rem] font-black italic uppercase leading-[1.05] mb-4 md:mb-6 group-hover:text-cyan-400 transition-colors tracking-tighter text-white drop-shadow-sm">${hero.title}</h2>
                        <p class="text-zinc-400 text-sm md:text-base leading-relaxed mb-6 md:mb-8 line-clamp-3 md:line-clamp-4">${hero.lead || ''}</p>
                        
                        <!-- Metadata editorial y CTA -->
                        <div class="flex items-center justify-between mt-auto pt-5 border-t border-zinc-800/50">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-zinc-900 border border-zinc-700 overflow-hidden flex items-center justify-center shrink-0">
                                    <i class="fas fa-pen-nib text-zinc-500 text-xs"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-bold text-zinc-300 uppercase tracking-widest">Velo Tech Desk</span>
                                    <div class="flex items-center flex-wrap gap-1.5 text-[9px] font-mono text-zinc-500 uppercase mt-0.5">
                                        <span class="text-cyan-400">${hero.date || 'HOY'}</span>
                                        <span class="w-1 h-1 bg-zinc-700 rounded-full"></span>
                                        <span><i class="fas fa-stopwatch opacity-70"></i> ${readTime} MIN</span>
                                        <span class="w-1 h-1 bg-zinc-700 rounded-full"></span>
                                        <span><i class="fas fa-brain opacity-70"></i> ${techLevel}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <span class="hidden md:flex shrink-0 items-center gap-2 text-[10px] font-black uppercase text-cyan-500 bg-cyan-500/10 px-4 py-2.5 rounded-full group-hover:bg-cyan-500 group-hover:text-black transition-colors border border-cyan-500/30 ml-4">
                                Leer <i class="fas fa-arrow-right"></i>
                            </span>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderHubs() {
            const searchTerm = searchInput.value.toLowerCase().trim();

            if (searchTerm !== '') {
                const filtered = allNews.filter(n => n.title.toLowerCase().includes(searchTerm) || (n.lead && n.lead.toLowerCase().includes(searchTerm)) || (n.tag && n.tag.toLowerCase().includes(searchTerm)));
                
                if (filtered.length === 0) {
                    feed.innerHTML = `<p class="text-zinc-500 text-center py-20 font-mono uppercase text-xs">Sin resultados para tu búsqueda.</p>`;
                    return;
                }
                
                let html = `<div class="mb-6"><h3 class="text-lg font-heading italic text-white uppercase border-b border-zinc-800 pb-3">Resultados de búsqueda</h3></div>`;
                html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">`;
                filtered.forEach(news => { html += buildVerticalCard(news); });
                html += `</div>`;
                feed.innerHTML = html;
                return;
            }

            if (allNews.length === 0) return;

            const hero = allNews[0];
            const rest = allNews.slice(1);

            const groups = {};
            rest.forEach(news => {
                const tag = (news.tag || 'ACTUALIDAD').toUpperCase();
                if (!groups[tag]) groups[tag] = [];
                groups[tag].push(news);
            });

            let html = renderHero(hero);

            const priorityTags = ['RACE REPORT', 'TECH LAB', 'DATA ANALYSIS', 'PREVIA'];
            const sortedTags = Object.keys(groups).sort((a, b) => {
                let idxA = priorityTags.indexOf(a); let idxB = priorityTags.indexOf(b);
                if (idxA === -1) idxA = 99; if (idxB === -1) idxB = 99;
                return idxA - idxB;
            });

            sortedTags.forEach(tag => {
                const tagData = TAG_COLORS[tag] || TAG_COLORS['DEFAULT'];
                const articles = groups[tag];
                
                html += `
                    <div class="mb-14 fade-in-up relative">
                        <div class="flex items-center gap-4 mb-6 border-b border-zinc-800/80 pb-3 px-2">
                            <span class="w-4 h-4 rounded shadow-lg flex-shrink-0 ${tagData.bg} ${tagData.shadow}"></span>
                            <h3 class="text-2xl md:text-3xl font-heading italic uppercase text-white tracking-tighter">${tag} <span class="text-zinc-700 font-sans font-light opacity-50 ml-2">(${articles.length})</span></h3>
                        </div>
                        <div class="flex overflow-x-auto hub-carousel gap-6 pb-6 px-2 snap-x snap-mandatory">
                `;
                articles.forEach(news => { html += buildVerticalCard(news); });
                html += `</div></div>`;
            });

            feed.innerHTML = html;
        }

        function getRecommendations(currentArticle) {
            let availableNews = allNews.filter(n => n.id != currentArticle.id);
            let recommendations = [];
            if (availableNews.length === 0) return recommendations;

            let relatedIndex = availableNews.findIndex(n => (n.tag || '').toUpperCase() === (currentArticle.tag || '').toUpperCase());
            if (relatedIndex !== -1) {
                recommendations.push(availableNews[relatedIndex]);
                availableNews.splice(relatedIndex, 1); 
            }

            if (availableNews.length > 0 && recommendations.length < 2) {
                let differentIndex = availableNews.findIndex(n => (n.tag || '').toUpperCase() !== (currentArticle.tag || '').toUpperCase());
                if (differentIndex !== -1) {
                    recommendations.push(availableNews[differentIndex]);
                    availableNews.splice(differentIndex, 1); 
                }
            }

            while (recommendations.length < 2 && availableNews.length > 0) {
                recommendations.push(availableNews[0]);
                availableNews.splice(0, 1);
            }
            return recommendations;
        }

        window.openArticle = (id) => {
            const article = allNews.find(n => n.id == id);
            if(!article) return;

            const slug = generateSlug(article.title);
            const cleanUrl = `/noticia/${id}/${slug}`;
            
            window.history.pushState({ articleId: id }, '', cleanUrl);
            document.title = `${article.title} | Velo Insights Journal`;
            
            const tagData = TAG_COLORS[(article.tag || '').toUpperCase()] || TAG_COLORS['DEFAULT'];
            const readTime = getReadingTime(article.content);
            const techLevel = getTechnicalLevel(readTime);
            const processedContent = interceptCloudinaryImages(article.content);
            const recommendedArticles = getRecommendations(article);
            
            let recommendationHTML = '';
            if (recommendedArticles.length > 0) {
                recommendationHTML = `
                    <div class="mt-16 md:mt-24 pt-10 border-t border-zinc-900">
                        <p class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-6 border-l-2 border-cyan-500 pl-3">Continúa leyendo en el Journal</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            ${recommendedArticles.map(rec => {
                                const recTag = TAG_COLORS[(rec.tag || '').toUpperCase()] || TAG_COLORS['DEFAULT'];
                                const recTime = getReadingTime(rec.content);
                                const recSlug = generateSlug(rec.title);
                                const recUrl = `/noticia/${rec.id}/${recSlug}`;
                                
                                return `
                                <a href="${recUrl}" onclick="event.preventDefault(); openArticle('${rec.id}')" class="block group cursor-pointer bg-zinc-900/50 hover:bg-zinc-900 border border-zinc-800/50 hover:border-cyan-500/50 rounded-2xl overflow-hidden transition-all flex flex-col h-full">
                                    <div class="h-32 md:h-40 w-full overflow-hidden relative border-b border-zinc-800/50">
                                        <img src="${rec.image || 'assets/placeholder.jpg'}" class="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
                                        <div class="absolute bottom-2 left-2"><span class="px-2 py-0.5 ${recTag.bg} ${recTag.text} text-[8px] font-black uppercase rounded tracking-widest shadow-lg">${rec.tag || 'INFO'}</span></div>
                                    </div>
                                    <div class="p-4 flex-1 flex flex-col">
                                        <h4 class="text-sm md:text-base font-black italic uppercase leading-tight text-zinc-300 group-hover:text-cyan-400 transition-colors tracking-tighter mb-2">${rec.title}</h4>
                                        <div class="mt-auto flex justify-between items-center">
                                            <span class="text-[9px] font-mono text-zinc-600 uppercase">${rec.date || 'HOY'}</span>
                                            <span class="text-[9px] font-mono text-zinc-600 uppercase">⏱️ ${recTime} MIN</span>
                                        </div>
                                    </div>
                                </a>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            modalContent.innerHTML = `
                <div class="h-[30vh] md:h-[50vh] w-full relative border-b border-zinc-900">
                    <img src="${article.image || 'assets/placeholder.jpg'}" class="w-full h-full object-cover grayscale opacity-90">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent"></div>
                </div>
                <div class="p-6 md:p-20 pt-8 md:pt-12">
                    <div class="max-w-3xl mx-auto">
                        <div class="mb-8 md:mb-12 border-b border-zinc-900 pb-8">
                            <span class="px-3 py-1 md:px-4 md:py-1.5 ${tagData.bg} ${tagData.text} rounded text-[9px] md:text-[10px] font-black uppercase mb-4 md:mb-6 inline-block tracking-widest shadow-lg">${article.tag || 'INFO'}</span>
                            <h1 class="text-2xl md:text-4xl lg:text-5xl font-heading text-white italic uppercase leading-[1.05] tracking-tighter mb-4">${article.title}</h1>
                            <div class="flex flex-wrap gap-3 items-center mt-4">
                                <p class="text-zinc-400 font-mono text-[10px] md:text-xs uppercase tracking-widest flex items-center gap-2">
                                    <span>${article.date || 'HOY'}</span> 
                                    <span class="text-zinc-700">•</span> 
                                    <span>VELO INSIGHTS</span>
                                    <span class="text-zinc-700">•</span>
                                    <span class="text-cyan-400 font-bold"><i class="fas fa-stopwatch"></i> ${readTime} MIN</span>
                                </p>
                                <span class="bg-zinc-900 border border-zinc-800 text-zinc-500 px-2 py-1 rounded text-[9px] font-mono font-bold uppercase tracking-widest flex items-center gap-1"><i class="fas fa-brain"></i> Nivel: ${techLevel}</span>
                            </div>
                        </div>
                        ${article.lead ? `<p class="text-lg md:text-xl text-zinc-200 font-serif leading-relaxed mb-8 md:mb-16 border-l-4 border-cyan-500 pl-4 md:pl-6 italic">"${article.lead}"</p>` : ''}
                        
                        <div class="prose-custom text-sm md:text-base">${processedContent || '<p class="text-center text-zinc-600">No hay contenido disponible.</p>'}</div>
                        
                        <div class="mt-12 md:mt-16 pt-8 md:pt-10 border-t border-zinc-900 flex flex-col sm:flex-row justify-center items-center gap-4">
                            
                            <button id="btn-vatios" onclick="inyectarVatios('${article.id}')" class="group relative inline-flex items-center gap-3 px-8 py-3.5 bg-emerald-500/10 border border-emerald-500/30 rounded-full hover:bg-emerald-500/20 transition-all active:scale-95 w-full sm:w-auto justify-center">
                                <div class="absolute inset-0 bg-emerald-500/20 blur-md rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <i class="fas fa-bolt text-emerald-400 text-lg group-hover:text-emerald-300 group-hover:animate-pulse"></i>
                                <span class="text-xs font-black uppercase tracking-widest text-emerald-400 group-hover:text-emerald-300 relative z-10"><span id="vatios-count">${article.vatios || 0}</span> W INYECTADOS</span>
                            </button>
                            
                            <button onclick="shareNative('${article.title.replace(/'/g, "\\'")}', '${article.id}', '${slug}')" class="group inline-flex items-center gap-2 px-8 py-3.5 bg-zinc-900 border border-zinc-800 rounded-full hover:border-cyan-500 transition-all active:scale-95 w-full sm:w-auto justify-center">
                                <span class="text-[10px] md:text-xs font-bold uppercase text-zinc-300 group-hover:text-white tracking-widest">Compartir</span>
                                <svg class="w-4 h-4 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            </button>
                        </div>

                        ${recommendationHTML}
                    </div>
                </div>
            `;
            
            modal.classList.remove('modal-hidden');
            modal.classList.add('modal-visible');
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0; 

            if(localStorage.getItem(`voted_${article.id}`)) {
                const btn = document.getElementById('btn-vatios');
                btn.classList.replace('border-emerald-500/30', 'border-emerald-500');
                btn.classList.replace('bg-emerald-500/10', 'bg-emerald-950/50');
                btn.querySelector('i').classList.replace('fa-bolt', 'fa-check-circle');
            }

            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
        };

        window.inyectarVatios = async (articleId) => {
            const btn = document.getElementById('btn-vatios');
            const countSpan = document.getElementById('vatios-count');
            
            if(localStorage.getItem(`voted_${articleId}`)) {
                alert("⚡ Ya has alcanzado tu FTP máximo en este artículo.");
                return;
            }

            btn.classList.add('animate-pulse');
            btn.style.pointerEvents = 'none';

            try {
                const res = await fetch(`/api/news/${articleId}/vatios`, { method: 'POST' });
                
                if(res.ok) {
                    const data = await res.json();
                    
                    let current = parseInt(countSpan.innerText) || 0;
                    const target = data.vatios;
                    const step = Math.ceil((target - current) / 10) || 1;
                    
                    const timer = setInterval(() => {
                        current += step;
                        if(current >= target) {
                            current = target;
                            clearInterval(timer);
                            btn.classList.replace('border-emerald-500/30', 'border-emerald-500');
                            btn.classList.replace('bg-emerald-500/10', 'bg-emerald-950/50');
                            btn.querySelector('i').classList.replace('fa-bolt', 'fa-check-circle');
                        }
                        countSpan.innerText = current;
                    }, 30);

                    localStorage.setItem(`voted_${articleId}`, 'true');
                    
                    const articleIndex = allNews.findIndex(n => n.id == articleId);
                    if(articleIndex !== -1) allNews[articleIndex].vatios = target;

                } else if(res.status === 429) {
                    alert("⚠️ Control Anti-Dopaje: Nuestro servidor detecta que tu IP ya ha generado vatios aquí.");
                    localStorage.setItem(`voted_${articleId}`, 'true'); 
                    btn.classList.replace('border-emerald-500/30', 'border-emerald-500');
                    btn.classList.replace('bg-emerald-500/10', 'bg-emerald-950/50');
                    btn.querySelector('i').classList.replace('fa-bolt', 'fa-check-circle');
                }
            } catch (e) {
                console.error("Error al inyectar vatios:", e);
            }
            
            btn.classList.remove('animate-pulse');
            btn.style.pointerEvents = 'auto';
        };

        window.closeArticle = () => {
            modal.classList.remove('modal-visible');
            modal.classList.add('modal-hidden');
            document.body.style.overflow = 'auto'; 
            
            progressContainer.classList.add('hidden');
            progressBar.style.width = '0%';

            window.history.pushState({}, '', '/noticias.html');
            document.title = "VELO INSIGHTS | Journal & Análisis Técnico";
            setTimeout(() => { modalContent.innerHTML = ''; }, 300);
        };

        modal.addEventListener('scroll', () => {
            if (modal.classList.contains('modal-visible')) {
                const scrollTop = modal.scrollTop;
                const scrollHeight = modal.scrollHeight - modal.clientHeight;
                let scrollPercentage = 0;
                if (scrollHeight > 0) {
                    scrollPercentage = (scrollTop / scrollHeight) * 100;
                }
                progressBar.style.width = Math.min(scrollPercentage, 100) + '%';
            }
        });

        window.shareNative = async (articleTitle, articleId, slug) => {
            const originUrl = `${window.location.origin}/noticia/${articleId}/${slug}`;
            if (navigator.share) {
                try { await navigator.share({ title: 'VELO INSIGHTS', text: articleTitle, url: originUrl }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(originUrl);
                alert("¡Enlace copiado!");
            }
        };

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.classList.contains('modal-hidden')) closeArticle(); });
        window.addEventListener('popstate', (e) => { if (e.state && e.state.articleId) { openArticle(e.state.articleId); } else { closeArticle(); } });
        document.addEventListener('DOMContentLoaded', fetchNews);
    </script>
</body>
</html>
